name: CI
on:
  push:
    branches-ignore:
      - 'generated'
      - 'codegen/**'
      - 'integrated/**'
      - 'stl-preview-head/**'
      - 'stl-preview-base/**'
  pull_request:
    branches-ignore:
      - 'stl-preview-head/**'
      - 'stl-preview-base/**'

jobs:
  lint:
    timeout-minutes: 15
    name: lint
    runs-on: ${{ github.repository == 'stainless-sdks/orb-kotlin' && 'depot-ubuntu-24.04' || 'ubuntu-latest' }}
    if: github.event_name == 'push' || github.event.pull_request.head.repo.fork

    steps:
      - uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: |
            8
            21
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run lints
        run: ./scripts/lint

  build:
    timeout-minutes: 15
    name: build
    # GitHub's small hosted runners can't run these Gradle jobs: the private
    # staging repo's die mid-build, and the public production repo's test job
    # deterministically fails LoggingHttpClientTest there (SLF4J binding not
    # loaded); run both repos' jobs on runs-on.
    runs-on: ${{ startsWith(github.repository, 'orbcorp/orb-kotlin') && format('runs-on={0}/image=ubuntu24-full-x64/runner=8cpu-linux-x64/spot=false/tag=sdk-ci', github.run_id) || 'ubuntu-latest' }}
    if: github.event_name == 'push' || github.event.pull_request.head.repo.fork

    steps:
      - uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: |
            8
            21
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build SDK
        run: ./scripts/build

  test:
    timeout-minutes: 15
    name: test
    # GitHub's small hosted runners can't run these Gradle jobs: the private
    # staging repo's die mid-build, and the public production repo's test job
    # deterministically fails LoggingHttpClientTest there (SLF4J binding not
    # loaded); run both repos' jobs on runs-on.
    runs-on: ${{ startsWith(github.repository, 'orbcorp/orb-kotlin') && format('runs-on={0}/image=ubuntu24-full-x64/runner=8cpu-linux-x64/spot=false/tag=sdk-ci', github.run_id) || 'ubuntu-latest' }}
    if: github.event_name == 'push' || github.event.pull_request.head.repo.fork
    steps:
      - uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: |
            8
            21
          cache: gradle

      - name: Set up Gradle
        uses: gradle/gradle-build-action@v2

      - name: Run tests
        run: ./scripts/test
